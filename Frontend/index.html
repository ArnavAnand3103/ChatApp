<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5865F2,#000000);
    color:white;
    text-align:center;
}
.container{
    max-width:400px;
}
.logo{
    width:220px;
    height:220px;
    object-fit:contain;
    margin-bottom:25px;
    border-radius:20px;
    filter: saturate(1.5) hue-rotate(-10deg);
 
}
h1{
    font-size:40px;
    margin-bottom:10px;
}
p{
    color:#ccc;
    margin-bottom:30px;
}
.btn{
    padding:14px 30px;
    border:2px solid white;
    border-radius:30px;
    background:transparent;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.1);
}


</style>
<body>
    <div class="container">
        <img src="../discordimg.jpg" alt="Discord Bot" class="logo">
        <h1>Get started</h1>
        <button class="btn" onclick="goToLogin()">Get Started</button>
    </div>
    <script>
        const APP_BASE = "http://localhost:5001";

        function goToLogin(){
            window.location.href=`${APP_BASE}/login.html`;
        }
    </script>
    
</body>
</html>
